<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Festival POS — Order</title>
<style>
  :root{
    --bg:#ffffff;--fg:#111;--muted:#667085;--card:#f5f7fb;--border:#e2e6ee;
    --ok:#16a34a;--okd:#0f7a37;--accent:#2563eb;--danger:#dc2626;--radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:-apple-system,system-ui,Segoe UI,Roboto,Arial;font-size:16px}
  .wrap{max-width:560px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:96px}
  .hero{background:#ecfdf3;padding:22px 18px 16px}
  .hero h1{margin:0;font-size:22px;font-weight:800;line-height:1.2}
  .hero .tag{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
  .pill{font-size:12px;background:#fff;border-radius:999px;padding:5px 11px;font-weight:700;color:var(--okd)}
  .pill.gray{color:var(--muted)}
  .cats{position:sticky;top:0;background:var(--bg);z-index:5;display:flex;gap:8px;overflow-x:auto;padding:12px 16px;border-bottom:1px solid var(--border)}
  .cats::-webkit-scrollbar{display:none}
  .cat{white-space:nowrap;border:1px solid var(--border);background:#fff;color:var(--muted);border-radius:999px;padding:8px 14px;font-weight:700;font-size:14px;cursor:pointer}
  .cat.active{background:var(--ok);border-color:var(--ok);color:#fff}
  .section{padding:6px 16px}
  .section h2{font-size:18px;margin:16px 0 4px}
  .item{display:flex;gap:12px;padding:14px 0;border-top:1px solid var(--border);cursor:pointer;align-items:center}
  .item:first-of-type{border-top:none}
  .item .info{flex:1;min-width:0}
  .item .nm{font-weight:700;font-size:16px}
  .item .ds{color:var(--muted);font-size:13px;line-height:1.45;margin-top:3px}
  .item .pr{color:var(--fg);font-size:15px;margin-top:4px}
  .thumb{width:84px;height:84px;border-radius:12px;background:#ecfdf3 center/cover no-repeat;flex:none;position:relative;display:flex;align-items:center;justify-content:center;color:#9fd9b4;font-size:26px}
  .add{position:absolute;right:-6px;bottom:-6px;width:32px;height:32px;border-radius:50%;background:var(--ok);color:#fff;border:2px solid #fff;font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .barwrap{position:fixed;left:0;right:0;bottom:0;padding:12px 16px 20px;background:linear-gradient(to top,var(--bg) 70%,transparent);z-index:20;pointer-events:none}
  .bar{max-width:528px;margin:0 auto;background:var(--ok);color:#fff;border-radius:14px;padding:15px 18px;display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:16px;pointer-events:auto;cursor:pointer;box-shadow:0 6px 20px rgba(22,163,74,.35);transition:transform .15s ease}
  .bar.hidden{display:none}
  .mask{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:flex;align-items:flex-end;justify-content:center}
  .sheet{background:#fff;width:100%;max-width:560px;border-radius:20px 20px 0 0;max-height:90vh;overflow:auto;padding:18px}
  .sheet h3{margin:0 0 10px;font-size:20px}
  .crow{display:flex;gap:10px;align-items:center;padding:12px 0;border-top:1px solid var(--border)}
  .crow .cn{flex:1;font-weight:700}
  .qty{display:flex;align-items:center;gap:10px}
  .qbtn{width:34px;height:34px;border-radius:9px;background:#eef2f7;border:none;font-size:20px;font-weight:800;cursor:pointer}
  .opt{display:flex;justify-content:space-between;align-items:center;padding:12px 2px;border-bottom:1px solid var(--border);cursor:pointer;font-size:16px}
  .check{width:26px;height:26px;border-radius:7px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
  .check.on{background:var(--ok);border-color:var(--ok)}
  input[type=text]{width:100%;font:inherit;padding:14px;border:1px solid var(--border);border-radius:12px;margin-top:6px}
  .btn{width:100%;border:none;border-radius:13px;padding:16px;font-size:17px;font-weight:800;cursor:pointer}
  .btn.ok{background:var(--ok);color:#fff}
  .btn.gray{background:#eef2f7;color:#111;margin-top:8px}
  .muted{color:var(--muted);font-size:14px}
  .total{display:flex;justify-content:space-between;font-weight:800;font-size:18px;margin:12px 0}
  .big{font-size:64px;font-weight:900;text-align:center;margin:6px 0}
  .center{text-align:center}
  .load{padding:60px 16px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1 id="heroTitle">Festival POS</h1>
    <div class="tag">
      <span class="pill">Pay cash at the window</span>
      <span class="pill gray">Order ahead</span>
    </div>
  </div>
  <div id="cats" class="cats"></div>
  <div id="menu"><div class="load">Loading menu…</div></div>
</div>

<div class="barwrap"><div id="bar" class="bar hidden" onclick="openCart()"><span id="barCount">0 items</span><span id="barTotal">View order · $0.00</span></div></div>

<div id="modMask" class="mask" style="display:none"><div class="sheet">
  <h3 id="modTitle">Customize</h3>
  <div id="modBody"></div>
  <button class="btn ok" style="margin-top:16px" onclick="confirmMods()">Add to order</button>
  <button class="btn gray" onclick="closeMod()">Cancel</button>
</div></div>

<div id="cartMask" class="mask" style="display:none"><div class="sheet">
  <h3>Your order</h3>
  <div id="cartBody"></div>
  <div class="total"><span>Total</span><span id="cartTotal">$0.00</span></div>
  <label class="muted" for="cust">Name for the order</label>
  <input id="cust" type="text" placeholder="Your name" autocomplete="name"/>
  <div id="cartMsg" class="muted" style="margin-top:8px;color:var(--danger)"></div>
  <button class="btn ok" style="margin-top:12px" onclick="placeOrder()" id="placeBtn">Place order</button>
  <button class="btn gray" onclick="closeCart()">Keep browsing</button>
</div></div>

<div id="doneMask" class="mask" style="display:none;align-items:center"><div class="sheet" style="border-radius:20px;max-width:440px;margin:16px">
  <div class="center muted">Your order number</div>
  <div class="big" id="doneNum">—</div>
  <div class="center" style="font-weight:700;font-size:18px">Show this number at the window and pay with cash.</div>
  <div class="center muted" style="margin-top:8px">Your food starts once payment is received.</div>
  <button class="btn ok" style="margin-top:18px" onclick="location.reload()">Start a new order</button>
</div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBu-Ux4lvGn6-pnBngmJzL0BAtW1uIfOKM",
  authDomain:"churchfestivalpos.firebaseapp.com",
  projectId:"churchfestivalpos",
  storageBucket:"churchfestivalpos.firebasestorage.app",
  messagingSenderId:"447909610900",
  appId:"1:447909610900:web:a54a828bacfa02e7883b81"
});
const db=firebase.firestore();
const $=s=>document.querySelector(s);

// Which church this QR/link is for. Every church has its own order page:
//   order.html?org=THE_ORG_ID
const ORG=new URLSearchParams(location.search).get('org');
// Base reference to this church's data. All reads/writes go through it.
const base = ORG ? db.collection('orgs').doc(ORG) : null;

let STATIONS=[], MENU=[], MODS=new Map(), CART=[], FILTER='__ALL__';
let modCtx=null;

if(!base){
  document.addEventListener('DOMContentLoaded',()=>{ const m=$('#menu'); if(m) m.innerHTML='<div class="load">This ordering link is missing its church code. Please scan the QR code again.</div>'; });
} else {
Promise.all([
  base.collection('settings').doc('config').get(),
  base.collection('mod_groups').get(),
  base.collection('menu').orderBy('name').get()
]).then(([cfg,mg,mn])=>{
  const c=cfg.data()||{}; STATIONS=Array.isArray(c.stations)?c.stations.filter(Boolean):[];
  mg.forEach(d=>MODS.set(d.id,{id:d.id,...d.data()}));
  MENU=[]; mn.forEach(d=>{const m={id:d.id,...d.data()}; if(m.active!==false && m.online!==false && m.soldOut!==true) MENU.push(m);});
  if(!STATIONS.length){ STATIONS=[...new Set(MENU.map(m=>m.station).filter(Boolean))]; }
  renderCats(); renderMenu();
}).catch(e=>{ $('#menu').innerHTML='<div class="load">Couldn’t load the menu. Please refresh.</div>'; });
}

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function money(n){return '$'+(Number(n||0)).toFixed(2);}

function renderCats(){
  $('#cats').innerHTML =
    `<div class="cat ${FILTER==='__ALL__'?'active':''}" onclick="setFilter('__ALL__')">All</div>`+
    STATIONS.map(s=>`<div class="cat ${FILTER===s?'active':''}" onclick="setFilter('${esc(s)}')">${esc(s)}</div>`).join('');
}
function setFilter(s){ FILTER=s; renderCats(); renderMenu(); window.scrollTo({top:0,behavior:'smooth'}); }

function renderMenu(){
  const groups = FILTER==='__ALL__' ? STATIONS : [FILTER];
  let html='';
  groups.forEach(st=>{
    const items=MENU.filter(m=>(m.station||'')===st);
    if(!items.length) return;
    html+=`<div class="section"><h2>${esc(st)}</h2>`;
    items.forEach(m=>{
      const img = m.img ? `style="background-image:url('${esc(m.img)}');color:transparent"` : '';
      html+=`<div class="item" onclick="tapItem('${m.id}', this)">
        <div class="info"><div class="nm">${esc(m.name)}</div>${m.desc?`<div class="ds">${esc(m.desc)}</div>`:''}<div class="pr">${money(m.price)}</div></div>
        <div class="thumb" ${img}>${m.img?'':'●'}<div class="add">+</div></div>
      </div>`;
    });
    html+=`</div>`;
  });
  const other=MENU.filter(m=>!STATIONS.includes(m.station||''));
  if(FILTER==='__ALL__' && other.length){
    html+=`<div class="section"><h2>More</h2>`+other.map(m=>`<div class="item" onclick="tapItem('${m.id}', this)"><div class="info"><div class="nm">${esc(m.name)}</div>${m.desc?`<div class="ds">${esc(m.desc)}</div>`:''}<div class="pr">${money(m.price)}</div></div><div class="thumb">●<div class="add">+</div></div></div>`).join('')+`</div>`;
  }
  $('#menu').innerHTML = html || '<div class="load">No items available.</div>';
}

function tapItem(id, el){
  const m=MENU.find(x=>x.id===id); if(!m) return;
  const gids=(Array.isArray(m.modGroupIds)?m.modGroupIds:[]).filter(Boolean);
  const groups=gids.map(g=>MODS.get(g)).filter(Boolean);
  if(!groups.length){ addLine(m,[]); flyToCart(el && el.querySelector('.add')); return; }
  modCtx={m,groups,sel:groups.map(g=>g.selectType==='single'?null:[])};
  $('#modTitle').textContent=m.name;
  $('#modBody').innerHTML=groups.map((g,gi)=>{
    return `<div style="margin-top:10px;font-weight:800">${esc(g.name)}${g.selectType==='multi'&&g.maxPicks?` <span class="muted">(up to ${g.maxPicks})</span>`:''}</div>`+
      (g.options||[]).map((o,oi)=>`<div class="opt" onclick="pickOpt(${gi},${oi})"><span><span class="check" id="ck_${gi}_${oi}"></span> ${esc(o.name)}</span><span class="muted">${o.price?'+'+money(o.price):''}</span></div>`).join('');
  }).join('');
  $('#modMask').style.display='flex';
}
function pickOpt(gi,oi){
  const g=modCtx.groups[gi];
  if(g.selectType==='single'){ modCtx.sel[gi]= modCtx.sel[gi]===oi?null:oi; }
  else {
    const arr=modCtx.sel[gi];
    const idx=arr.indexOf(oi);
    if(idx>=0) arr.splice(idx,1);
    else { if(g.maxPicks && arr.length>=g.maxPicks){ return; } arr.push(oi); }
  }
  modCtx.groups.forEach((gg,ggi)=>(gg.options||[]).forEach((o,ooi)=>{
    const on = gg.selectType==='single' ? modCtx.sel[ggi]===ooi : modCtx.sel[ggi].includes(ooi);
    const el=document.getElementById(`ck_${ggi}_${ooi}`); if(el){ el.className='check'+(on?' on':''); el.textContent=on?'✓':''; }
  }));
}
function confirmMods(){
  const {m,groups,sel}=modCtx;
  const mods=groups.map((g,gi)=>{
    const chosen=[];
    if(g.selectType==='single'){ if(sel[gi]!=null) chosen.push({name:g.options[sel[gi]].name,price:+g.options[sel[gi]].price||0}); }
    else sel[gi].forEach(oi=>chosen.push({name:g.options[oi].name,price:+g.options[oi].price||0}));
    return {groupName:g.name,options:chosen};
  });
  addLine(m,mods); closeMod(); bump();
}
function closeMod(){ $('#modMask').style.display='none'; modCtx=null; }

function addLine(m,mods){
  const modSum=(mods||[]).flatMap(g=>g.options||[]).reduce((a,b)=>a+(+b.price||0),0);
  const each=(+m.price||0)+modSum;
  const key=m.id+JSON.stringify(mods||[]);
  const ex=CART.find(l=>l.key===key);
  if(ex){ ex.qty++; } else CART.push({key,menuId:m.id,name:m.name,station:m.station||null,qty:1,each,mods:mods||[]});
  renderBar();
}
function cartTotal(){ return CART.reduce((a,l)=>a+l.each*l.qty,0); }
function cartCount(){ return CART.reduce((a,l)=>a+l.qty,0); }
function renderBar(){
  const n=cartCount();
  const bar=$('#bar');
  if(!n){ bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  $('#barCount').textContent=n+(n===1?' item':' items');
  $('#barTotal').textContent='View order · '+money(cartTotal());
}
function bump(){ const b=$('#bar'); b.style.transform='scale(1.03)'; setTimeout(()=>b.style.transform='',120); }
function flyToCart(sourceEl){
  const bar=document.getElementById('bar');
  if(!sourceEl || !bar) { bump(); return; }
  const s=sourceEl.getBoundingClientRect();
  const b=bar.getBoundingClientRect();
  const dot=document.createElement('div');
  dot.textContent='+';
  Object.assign(dot.style,{position:'fixed',left:(s.left+s.width/2-15)+'px',top:(s.top+s.height/2-15)+'px',
    width:'30px',height:'30px',borderRadius:'50%',background:'var(--ok)',color:'#fff',
    display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'800',fontSize:'20px',
    zIndex:'60',pointerEvents:'none',boxShadow:'0 4px 12px rgba(22,163,74,.4)',
    transition:'transform .5s cubic-bezier(.2,.7,.3,1), opacity .5s ease'});
  document.body.appendChild(dot);
  const tx=(b.left+b.width/2)-(s.left+s.width/2);
  const ty=(b.top+b.height/2)-(s.top+s.height/2);
  requestAnimationFrame(()=>{ dot.style.transform=`translate(${tx}px,${ty}px) scale(.25)`; dot.style.opacity='0.15'; });
  setTimeout(()=>{ dot.remove(); bump(); }, 520);
}

function openCart(){ renderCart(); $('#cartMask').style.display='flex'; }
function closeCart(){ $('#cartMask').style.display='none'; }
function renderCart(){
  $('#cartBody').innerHTML=CART.map((l,i)=>{
    const modsTxt=(l.mods||[]).flatMap(g=>(g.options||[]).map(o=>o.name)).join(', ');
    return `<div class="crow"><div class="cn">${esc(l.name)}${modsTxt?`<div class="muted">${esc(modsTxt)}</div>`:''}<div class="muted">${money(l.each)} each</div></div>
      <div class="qty"><button class="qbtn" onclick="chg(${i},-1)">−</button><b>${l.qty}</b><button class="qbtn" onclick="chg(${i},1)">+</button></div></div>`;
  }).join('') || '<div class="muted">Your order is empty.</div>';
  $('#cartTotal').textContent=money(cartTotal());
}
function chg(i,d){ CART[i].qty+=d; if(CART[i].qty<=0) CART.splice(i,1); renderBar(); if(!CART.length){closeCart();} else renderCart(); }

async function nextNumber(){
  const ref=base.collection('meta').doc('order_seq');
  return db.runTransaction(async tx=>{
    const s=await tx.get(ref);
    let v=(s.exists && typeof s.data().value==='number')?s.data().value:0;
    v++; tx.set(ref,{value:v},{merge:true}); return v;
  });
}
async function placeOrder(){
  const cust=($('#cust').value||'').trim();
  if(!CART.length){ return; }
  if(!cust){ $('#cartMsg').textContent='Please add your name.'; return; }
  const btn=$('#placeBtn'); btn.disabled=true; btn.textContent='Placing…'; $('#cartMsg').textContent='';
  try{
    const number=await nextNumber();
    const ts=Date.now();
    await base.collection('orders').add({
      number, source:'online', paid:false, status:'unpaid', createdAt:ts, updatedAt:ts, customer:cust,
      total:cartTotal(),
      items:CART.map(l=>({menuId:l.menuId,name:l.name,qty:l.qty,price:l.each,station:l.station||null,
        mods:(l.mods||[]).map(g=>({groupName:g.groupName,options:(g.options||[]).map(o=>({name:o.name,price:+o.price||0}))}))}))
    });
    closeCart();
    $('#doneNum').textContent=number;
    $('#doneMask').style.display='flex';
  }catch(e){
    $('#cartMsg').textContent='Something went wrong. Please try again.';
    btn.disabled=false; btn.textContent='Place order';
  }
}
</script>
</body></html>
